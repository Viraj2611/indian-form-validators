name: indian_form_validators
description: >
  A comprehensive, zero-dependency Dart package for validating Indian
  financial and identity form fields — PAN, Aadhaar, IFSC, GST, UPI,
  mobile numbers, and pincodes. Includes Verhoeff checksum for Aadhaar.
version: 1.0.0
homepage: https://github.com/Viraj2611/indian_form_validators

environment:
  sdk: ">=3.0.0 <4.0.0"

dev_dependencies:
  test: ^1.24.0
  lints: ^3.0.0
